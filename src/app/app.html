<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-icon">💰</span>
      <div>
        <div class="brand-name">MoneyMate</div>
        <div class="brand-sub">Money Manager</div>
      </div>
    </div>
    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active">
        <span class="nav-icon">⊞</span> Dashboard
      </a>
      <a routerLink="/chits" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span class="nav-icon">☰</span> Chit List
      </a>
      <a routerLink="/chits/add" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span class="nav-icon">＋</span> Add Chit
      </a>
      <a routerLink="/payments" routerLinkActive="active">
        <span class="nav-icon">₹</span> Payments
      </a>
      <a routerLink="/reports" routerLinkActive="active">
        <span class="nav-icon">◎</span> Reports
      </a>
      <a routerLink="/lending" routerLinkActive="active">
        <span class="nav-icon">🤝</span> Lending
      </a>
      <a routerLink="/credit-cards" routerLinkActive="active">
        <span class="nav-icon">💳</span> Credit Cards
      </a>
    </nav>
  </aside>

  <main class="main">
    <router-outlet />
  </main>

  <!-- More Menu Drawer -->
  <div class="more-drawer" [class.open]="moreOpen">
    <a routerLink="/lending" routerLinkActive="active" (click)="moreOpen=false"><span>🤝</span> Lending</a>
    <a routerLink="/credit-cards" routerLinkActive="active" (click)="moreOpen=false"><span>💳</span> Credit Cards</a>
    <a routerLink="/reports" routerLinkActive="active" (click)="moreOpen=false"><span>◎</span> Reports</a>
  </div>
  <div class="more-overlay" *ngIf="moreOpen" (click)="moreOpen=false"></div>

  <nav class="bottom-nav">
    <a routerLink="/dashboard" routerLinkActive="active">
      <span>⊞</span><label>Home</label>
    </a>
    <a routerLink="/chits" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <span>☰</span><label>Chits</label>
    </a>
    <a routerLink="/chits/add" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="fab">
      <span>＋</span>
    </a>
    <a routerLink="/payments" routerLinkActive="active">
      <span>₹</span><label>Pay</label>
    </a>
    <a (click)="moreOpen=!moreOpen" [class.active]="moreOpen">
      <span>⋯</span><label>More</label>
    </a>
  </nav>
</div>
