<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-icon">💰</span>
      <div>
        <div class="brand-name">MoneyMate</div>
        <div class="brand-sub">Money Manager</div>
      </div>
    </div>
    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active">
        <span class="nav-icon">⊞</span> Dashboard
      </a>
      <a routerLink="/chits" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span class="nav-icon">☰</span> Chit List
      </a>
      <a routerLink="/chits/add" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span class="nav-icon">＋</span> Add Chit
      </a>
      <a routerLink="/payments" routerLinkActive="active">
        <span class="nav-icon">₹</span> Payments
      </a>
      <a routerLink="/reports" routerLinkActive="active">
        <span class="nav-icon">◎</span> Reports
      </a>
      <a routerLink="/lending" routerLinkActive="active">
        <span class="nav-icon">🤝</span> Lending
      </a>
      <a routerLink="/credit-cards" routerLinkActive="active">
        <span class="nav-icon">💳</span> Credit Cards
      </a>
    </nav>
  </aside>

  <main class="main">
    <router-outlet />
  </main>

  <nav class="bottom-nav">
    <a routerLink="/dashboard" routerLinkActive="active">
      <span>⊞</span><label>Home</label>
    </a>
    <a routerLink="/chits" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span>☰</span><label>Chits</label>
      </a>
    <a routerLink="/chits/add" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span>＋</span><label>Add</label>
      </a>
    <a routerLink="/payments" routerLinkActive="active">
      <span>₹</span><label>Pay</label>
    </a>
    <a routerLink="/lending" routerLinkActive="active">
      <span>🤝</span><label>Lend</label>
    </a>
    <a routerLink="/credit-cards" routerLinkActive="active">
      <span>💳</span><label>Cards</label>
    </a>
    <a routerLink="/reports" routerLinkActive="active">
      <span>◎</span><label>Reports</label>
    </a>
  </nav>
</div>
